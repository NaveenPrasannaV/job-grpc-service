syntax = "proto3";

option java_package = "org.nit.jobapp";
option java_multiple_files = true;

service JobService {

  rpc GetJob (JobRequest) returns (JobResponse);

}

message JobRequest {
  int32 postId = 1;
}

message JobResponse {
  int32 postId = 1;
  string profile = 2;
  string description = 3;
}